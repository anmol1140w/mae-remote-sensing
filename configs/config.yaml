# Experiment Configuration for MAE Remote Sensing

# General Settings
seed: 42
device: "cuda" # "cuda", "cpu", or "auto"
output_dir: "outputs"
experiment_name: "mae_eurosat_v1"

# Dataset Settings
dataset:
  name: "EuroSAT"
  path: "datasets/EuroSAT"
  image_size: 64
  patch_size: 4
  num_classes: 10
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  batch_size: 64
  num_workers: 4

# MAE Model Architecture
model:
  patch_size: 4
  in_chans: 3
  embed_dim: 128
  depth: 6
  num_heads: 8
  decoder_embed_dim: 64
  decoder_depth: 4
  decoder_num_heads: 4
  mlp_ratio: 4.0
  mask_ratio: 0.75
  norm_pix_loss: true

# Pre-training Settings
pretrain:
  epochs: 100
  warmup_epochs: 10
  base_lr: 0.00015
  min_lr: 0.00001
  weight_decay: 0.05
  clip_grad: 1.0

# Fine-tuning Settings
finetune:
  epochs: 50
  warmup_epochs: 5
  base_lr: 0.0005
  min_lr: 0.000001
  weight_decay: 0.05
  layer_decay: 0.75
  drop_path: 0.1

# Visualization Settings
vis:
  save_freq: 10
  num_samples: 8
  tsne_samples: 1000
